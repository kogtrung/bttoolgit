<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${task.id != null} ? 'Chỉnh sửa công việc' : 'Tạo công việc mới'">Tạo/Sửa công việc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0f172a;
            --bg-end: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.97);
            --accent: #0ea5e9;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        * { font-family: 'DM Sans', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            padding: 1.5rem;
        }
        .task-form-card {
            background: var(--card-bg);
            border-radius: 1.25rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
            border: 1px solid var(--border);
            overflow: hidden;
            max-width: 540px;
        }
        .task-form-card .card-header {
            background: linear-gradient(135deg, var(--accent) 0%, #06b6d4 100%);
            color: #fff;
            padding: 1.25rem 1.75rem;
            border: none;
            font-weight: 600;
            font-size: 1.25rem;
        }
        .task-form-card .card-body { padding: 1.75rem 1.75rem 1.5rem; }
        .task-form-card .form-label { font-weight: 500; color: #334155; margin-bottom: 0.375rem; }
        .task-form-card .form-control, .task-form-card .form-select {
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            padding: 0.625rem 1rem;
        }
        .task-form-card .form-control:focus, .task-form-card .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }
        .task-form-card .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #06b6d4 100%);
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 1.25rem;
            font-weight: 600;
        }
        .task-form-card .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -10px rgba(14, 165, 233, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card task-form-card shadow">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span th:text="${task.id != null} ? 'Chỉnh sửa công việc' : 'Tạo công việc mới'">Tạo/Sửa</span>
                        <a th:href="@{/tasks}" class="btn btn-light btn-sm">← Danh sách</a>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-success" role="alert" th:if="${successMessage}">
                            <span th:text="${successMessage}">Cập nhật thành công</span>
                        </div>
                        <div class="alert alert-danger" role="alert" th:if="${errorMessage}">
                            <span th:text="${errorMessage}">Có lỗi xảy ra</span>
                        </div>


                        
                        <!-- Form tạo mới -->
                        <form th:if="${task.id == null}" th:action="@{/tasks/create}" th:object="${task}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label for="title" class="form-label">Tiêu đề</label>
                                <input type="text" class="form-control" id="title" th:field="*{title}" placeholder="Nhập tiêu đề công việc" required autocomplete="off">
                            </div>
                            <div class="mb-4">
                                <label for="description" class="form-label">Mô tả</label>
                                <textarea class="form-control" id="description" th:field="*{description}" rows="4" placeholder="Nhập mô tả chi tiết (tùy chọn)"></textarea>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Tạo công việc</button>
                            </div>
                        </form>

                        <!-- Form cập nhật -->
                        <form th:if="${task.id != null}" th:action="@{/tasks/update}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="id" th:value="${task.id}"/>
                            <div class="mb-3">
                                <label for="titleEdit" class="form-label">Tiêu đề</label>
                                <input type="text" class="form-control" id="titleEdit" name="title"
                                       th:value="${task.title}" placeholder="Ví dụ: Làm báo cáo môn Spring" required>
                            </div>
                            <div class="mb-3">
                                <label for="descriptionEdit" class="form-label">Mô tả</label>
                                <textarea class="form-control" id="descriptionEdit" name="description" rows="4"
                                          placeholder="Ghi chú thêm (không bắt buộc)"
                                          th:text="${task.description}"></textarea>
                            </div>
                            <div class="mb-4">
                                <label for="status" class="form-label">Trạng thái</label>
                                <select class="form-select" id="status" name="status">
                                    <option th:value="PENDING" th:selected="${task.status.name() == 'PENDING'}">Đang chờ</option>
                                    <option th:value="COMPLETED" th:selected="${task.status.name() == 'COMPLETED'}">Hoàn thành</option>
                                </select>
                            </div>
                            <div class="d-flex gap-2 justify-content-end">
                                <a th:href="@{/tasks}" class="btn btn-outline-secondary">Hủy</a>
                                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
