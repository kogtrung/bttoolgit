<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo công việc</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Tạo công việc mới</h3>
        </div>

        <div class="card-body">
            <form th:action="@{/tasks/save}" th:object="${task}" method="post">
                
                <div class="mb-3">
                    <label class="form-label">Tên công việc</label>
                    <input type="text" class="form-control" th:field="*{title}" placeholder="Nhập tên công việc">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mô tả</label>
                    <textarea class="form-control" th:field="*{description}" rows="4" placeholder="Nhập mô tả công việc"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ngày hết hạn</label>
                    <input type="date" class="form-control" th:field="*{dueDate}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Trạng thái</label>
                    <select class="form-select" th:field="*{status}">
                        <option value="PENDING">Chưa làm</option>
                        <option value="IN_PROGRESS">Đang làm</option>
                        <option value="DONE">Hoàn thành</option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Lưu</button>
                    <a th:href="@{/tasks}" class="btn btn-secondary">Quay lại</a>
                </div>

            </form>
        </div>
    </div>
</div>
</body>
</html>
