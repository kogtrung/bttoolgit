<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Mini Task Manager</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            background: #ffffff;
        }
        .login-title {
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
        .btn-primary {
            padding: 0.6rem;
            font-weight: 600;
        }
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2 class="login-title">Đăng Nhập</h2>
    
    <!-- Hiển thị thông báo lỗi từ controller (nếu có) -->
    <div th:if="${error}" class="alert alert-danger py-2" role="alert">
        <small th:text="${error}"></small>
    </div>
    
    <!-- Hiển thị thông báo thành công (ví dụ sau khi đăng ký hoặc đăng xuất) -->
    <div th:if="${message}" class="alert alert-success py-2" role="alert">
        <small th:text="${message}"></small>
    </div>

    <!-- Spring Security tự động xử lý request POST đến /login nếu được cấu hình -->
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Tên đăng nhập</label>
            <input type="text" class="form-control" id="username" name="username" 
                   placeholder="Nhập tên đăng nhập" required autofocus>
        </div>
        
        <div class="mb-3">
            <label for="password" class="form-label">Mật khẩu</label>
            <input type="password" class="form-control" id="password" name="password" 
                   placeholder="Nhập mật khẩu" required>
        </div>
        
        <div class="mb-3 d-flex justify-content-between align-items-center">
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                <label class="form-check-label" for="remember-me" style="font-size: 0.85rem;">Ghi nhớ</label>
            </div>
            <a href="#" class="text-decoration-none" style="font-size: 0.85rem;">Quên mật khẩu?</a>
        </div>
        
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">Đăng nhập</button>
        </div>
    </form>
    
    <div class="register-link text-muted">
        Chưa có tài khoản? <a th:href="@{/register}" class="text-primary text-decoration-none fw-bold">Đăng ký ngay</a>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
